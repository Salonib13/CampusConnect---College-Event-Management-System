<!DOCTYPE html>
<html>
<head>
  <title>Create Event</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container-box">
  <h3 class="text-center mb-4">Create Event</h3>

  <form id="createEventForm">
    <input type="text" id="name" class="form-control mb-3" placeholder="Event Name" required>

    <textarea id="description" class="form-control mb-3" placeholder="Description"></textarea>

    <input type="date" id="date" class="form-control mb-3" required>
    <input type="time" id="time" class="form-control mb-3" required>

    <button class="btn btn-primary w-100">Create Event</button>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
